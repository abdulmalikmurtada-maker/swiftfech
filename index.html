<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwiftFetch - Kamo Bidiyo</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; background-color: #f4f4f9; }
        input { padding: 12px; width: 80%; max-width: 350px; margin-bottom: 15px; border-radius: 5px; border: 1px solid #ccc; }
        button { padding: 12px 25px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:disabled { background-color: #cccccc; cursor: not-allowed; }
    </style>
</head>
<body>

    <h2>SwiftFetch 🚀</h2>
    <p>Saka link din bidiyo daga kowa da kowa</p>

    <input type="text" id="linkInput" placeholder="Saka link a nan...">
    <br>
    <button id="maballiBtn" onclick="nemoBidiyo()">Kamo Bidiyo</button>

    <script>
        async function nemoBidiyo() {
            let linkDinBidiyo = document.getElementById("linkInput").value;
            let maballi = document.getElementById("maballiBtn");

            if (linkDinBidiyo === "") {
                alert("⚠️ Don Allah ka saka link din bidiyo.");
                return;
            }

            let tsohonRubutu = maballi.innerHTML;
            maballi.innerHTML = "Ana Neman Bidiyo... ⏳";
            maballi.disabled = true;

            try {
                // Mun hada Injin kamo bidiyo da tabbatacciyar Gadar AllOrigins don kaucewa "Failed to fetch"
                let ainihinKafa = "https://api.ryzendesu.vip/api/downloader/fbdl?url=" + encodeURIComponent(linkDinBidiyo);
                let kafa = "https://api.allorigins.win/raw?url=" + encodeURIComponent(ainihinKafa);
                
                let sakamako = await fetch(kafa);
                let bayanai = await sakamako.json();

                // Muna duba ko mun samu nasarar dauko bayanan
                if (bayanai && bayanai.data) {
                    alert("✅ An kamo bidiyon! Za a fara saukewa...");
                    // Zai dauko link din bidiyon mai inganci (HD) ko na kowa (SD) ko na asali
                    window.location.href = bayanai.data.hd || bayanai.data.sd || bayanai.data.url; 
                } else {
                    alert("⚠️ Ba a samu bidiyon ba. Ka tabbatar link din da ka saka na Facebook ne mai kyau.");
                }

            } catch (matsala) {
                alert("Ainihin Matsalar ita ce: " + matsala.message);
            }

            maballi.innerHTML = tsohonRubutu;
            maballi.disabled = false;
        }
    </script>
</body>
</html>
