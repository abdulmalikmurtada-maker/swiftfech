<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwiftFetch - Kamo Bidiyo</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; background-color: #f4f4f9; }
        input { padding: 12px; width: 80%; max-width: 350px; margin-bottom: 15px; border-radius: 5px; border: 1px solid #ccc; }
        button { padding: 12px 25px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:disabled { background-color: #cccccc; cursor: not-allowed; }
    </style>
</head>
<body>

    <h2>SwiftFetch 🚀</h2>
    <p>Saka link din bidiyo daga kowa da kowa</p>

    <input type="text" id="linkInput" placeholder="Saka link a nan...">
    <br>
    <button id="maballiBtn" onclick="nemoBidiyo()">Kamo Bidiyo</button>

    <script>
        async function nemoBidiyo() {
            let linkDinBidiyo = document.getElementById("linkInput").value;
            let maballi = document.getElementById("maballiBtn");

            if (linkDinBidiyo === "") {
                alert("⚠️ Don Allah ka saka link din bidiyo.");
                return;
            }

            let tsohonRubutu = maballi.innerHTML;
            maballi.innerHTML = "Ana Neman Bidiyo... ⏳";
            maballi.disabled = true;

            try {
                // SABON INJI: Mun sanya BK9 API wanda yafi karfi
                let ainihinKafa = "https://bk9.fun/download/fb?url=" + encodeURIComponent(linkDinBidiyo);
                let kafa = "https://corsproxy.io/?" + encodeURIComponent(ainihinKafa);
                
                let sakamako = await fetch(kafa);
                
                if (!sakamako.ok) {
                    throw new Error("Gadar ta ki bayar da hadin kai (Status: " + sakamako.status + ")");
                }

                let bayanai = await sakamako.json(); 

                // Wannan tsarin yana duba inda sabon injin ya ajiye link din bidiyon
                let bidiyoGuda = null;
                if (bayanai.BK9) {
                    bidiyoGuda = bayanai.BK9.hd || bayanai.BK9.sd || bayanai.BK9.video;
                } else if (bayanai.result) {
                    bidiyoGuda = bayanai.result.hd || bayanai.result.sd || bayanai.result.url;
                } else if (bayanai.data) {
                    bidiyoGuda = bayanai.data.hd || bayanai.data.sd || bayanai.data.url;
                }

                if (bidiyoGuda) {
                    alert("✅ An kamo bidiyon! Za a fara saukewa...");
                    window.location.href = bidiyoGuda; 
                } else {
                    alert("⚠️ API din ya kawo amsa, amma ba a ga ainihin bidiyon ba. Wataqila link din bai da kyau ko kuma kariya ta hana.");
                }

            } catch (matsala) {
                alert("Ainihin Matsalar ita ce: " + matsala.message);
            }

            maballi.innerHTML = tsohonRubutu;
            maballi.disabled = false;
        }
    </script>
</body>
</html>
