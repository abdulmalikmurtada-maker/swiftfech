<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwiftFetch - Kamo Bidiyo</title>
    <style>
        /* Wannan yana gyara kwalliyar shafin ne */
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; background-color: #f4f4f9; }
        input { padding: 12px; width: 80%; max-width: 350px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #ccc; }
        button { padding: 12px 25px; background-color: #28a745; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
        button:disabled { background-color: #cccccc; cursor: not-allowed; }
    </style>
</head>
<body>

    <h2>SwiftFetch 🚀</h2>
    <p>Saka link din bidiyo daga kowa da kowa</p>
    
    <input type="text" id="linkInput" placeholder="Saka link a nan...">
    <br>
    <button id="maballiBtn" onclick="nemoBidiyo()">Kamo Bidiyo</button>

    <script>
        async function nemoBidiyo() {
            let linkDinBidiyo = document.getElementById("linkInput").value;
            let maballi = document.getElementById("maballiBtn");

            if (linkDinBidiyo === "") {
                alert("⚠️ Don Allah ka saka link din bidiyo.");
                return;
            }

            let tsohonRubutu = maballi.innerHTML;
            maballi.innerHTML = "Ana Neman Bidiyo... ⏳";
            maballi.disabled = true;

            try {
                // Wannan shine layin da muka gyara na Cobalt API
                let sakamako = await fetch("https://co.wuk.sh/api/json", {
                    method: "POST",
                    headers: {
                        "Accept": "application/json",
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ url: linkDinBidiyo })
                });

                let bayanai = await sakamako.json();

                if (bayanai.url) {
                    alert("✅ An kamo bidiyon! Za a fara saukewa...");
                    window.location.href = bayanai.url;
                } else {
                    alert("⚠️ Ba a samu bidiyon ba. Ka duba ko link din yana da matsala.");
                }

            } catch (matsala) {
                // Wannan shine sabon layin da zai fallasa mana ainihin matsalar
                alert("Ainihin Matsalar ita ce: " + matsala.message);
            }

            maballi.innerHTML = tsohonRubutu;
            maballi.disabled = false;
        }
    </script>
