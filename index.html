<script>
        async function nemoBidiyo() {
            let linkDinBidiyo = document.getElementById("linkInput").value;
            let maballi = document.getElementById("maballiBtn");

            if (linkDinBidiyo === "") {
                alert("⚠️ Don Allah ka saka link din bidiyo.");
                return;
            }

            let tsohonRubutu = maballi.innerHTML;
            maballi.innerHTML = "Ana Neman Bidiyo... ⏳";
            maballi.disabled = true;

            try {
                // SABON INJIN KAMO BIDIYO (Baya bukatan CORS Proxy)
                let kafa = "https://api.ryzendesu.vip/api/downloader/fbdl?url=" + encodeURIComponent(linkDinBidiyo);
                
                let sakamako = await fetch(kafa);
                let bayanai = await sakamako.json();

                // Muna duba ko mun samu nasarar dauko bayanan
                if (bayanai && bayanai.data) {
                    alert("✅ An kamo bidiyon! Za a fara saukewa...");
                    // Zai dauko link din bidiyon mai inganci (HD) ko na kowa (SD)
                    window.location.href = bayanai.data.hd || bayanai.data.sd; 
                } else {
                    alert("⚠️ Ba a samu bidiyon ba. Ka tabbatar link din da ka saka na Facebook ne mai kyau.");
                }

            } catch (matsala) {
                alert("Ainihin Matsalar ita ce: " + matsala.message);
            }

            maballi.innerHTML = tsohonRubutu;
            maballi.disabled = false;
        }
</script>
